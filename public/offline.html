<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | ZimFarm ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #2E8B57;
            --bg-dark: #121614;
            --text-main: #FFFFFF;
            --text-muted: #A0AEC0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }

        .icon-container {
            width: 120px;
            height: 120px;
            background: rgba(46, 139, 87, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            position: relative;
        }

        .main-icon {
            font-size: 3rem;
            color: var(--primary-green);
        }

        .wifi-slash {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #EF4444;
            background: var(--bg-dark);
            border-radius: 50%;
            padding: 4px;
            font-size: 1.2rem;
        }

        h1 {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 300px;
            margin-bottom: 32px;
        }

        .btn-retry {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
        }

        .btn-retry:active {
            transform: scale(0.95);
            background-color: #246b43;
        }

        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="icon-container">
        <i class="fa-solid fa-tractor main-icon"></i>
        <i class="fa-solid fa-wifi-slash wifi-slash"></i>
    </div>

    <h1>Tiri Offline, Boss</h1>
    <p>You are currently offline. Check your data or move to a better coverage area to access ZimFarm ERP.</p>

    <button onclick="window.location.reload()" class="btn-retry">
        Try Again
    </button>

    <div class="footer">
        &copy; 2026 ZimFarm Solutions
    </div>
</body>
</html>
