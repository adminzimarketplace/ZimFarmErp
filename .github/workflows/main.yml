name: ZimFarm CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy_hosting:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"

  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: deploy_hosting
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Android SDK
        run: |
          # Ensure absolute paths and license acceptance
          # On ubuntu-latest, the SDK is at /usr/local/lib/android/sdk
          export ANDROID_HOME=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          
          # Add both the latest cmdline-tools and platform-tools to PATH
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          
          # Accept licenses and install platform components
          # We use the full path to sdkmanager to be absolutely sure
          SDK_MANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDK_MANAGER --licenses || true
          $SDK_MANAGER "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Configure Bubblewrap
        run: |
          # Create the config directory
          mkdir -p ~/.bubblewrap
          
          # Manually create the config.json to bypass interactive prompts entirely
          # We use the standard paths available on the ubuntu-latest runner
          echo "{
            \"jdkPath\": \"${JAVA_HOME}\",
            \"androidSdkPath\": \"/usr/local/lib/android/sdk\"
          }" > ~/.bubblewrap/config.json
          
          # Verify the config exists
          ls -la ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Prepare Signing Key
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "No keystore secret found. Generating a temporary development key..."
            keytool -genkey -v -keystore android.keystore -alias zimfarm -keyalg RSA -keysize 2048 -validity 10000 -storepass changeme -keypass changeme -dname "CN=ZimFarm, OU=IT, O=ZimFarm, L=Harare, S=ZW, C=ZW"
            echo "KEYSTORE_PASS=changeme" >> $GITHUB_ENV
            echo "KEY_PASS=changeme" >> $GITHUB_ENV
            echo "KEY_ALIAS=zimfarm" >> $GITHUB_ENV
          else
            echo "Using provided keystore secret..."
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android.keystore
            echo "KEYSTORE_PASS=${{ secrets.ANDROID_KEY_STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASS=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          fi

      - name: Build APK with Bubblewrap
        run: |
          # Initialize the project from the manifest (non-interactive)
          bubblewrap init --manifest=twa-manifest.json --yes --directory=./android_project --confirmResign --skipSigning
          
          # Move to the project and build
          cd android_project
          bubblewrap build --signingKeyPath=../android.keystore --signingKeyAlias=$KEY_ALIAS --signingKeyPassword=$KEY_PASS --signingKeyStorePassword=$KEYSTORE_PASS
          
          # Move the APK and AAB back to root
          # We use a wildcard to ensure we catch the output regardless of naming
          mv -v ./release/*.apk ../ZimFarm-Release.apk || mv -v ./*.apk ../ZimFarm-Release.apk || true
          mv -v ./release/*.aab ../ZimFarm-Release.aab || mv -v ./*.aab ../ZimFarm-Release.aab || true
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASS }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ env.KEY_PASS }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZimFarm-Android-Resources
          path: |
            ./*.apk
            ./*.aab
